<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Series — list mockup</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../site/_design-system/css/tokens.css">
<link rel="stylesheet" href="../site/_design-system/css/base.css">
<link rel="stylesheet" href="../site/_design-system/css/typography.css">
<link rel="stylesheet" href="../site/_design-system/css/shell.css">
<link rel="stylesheet" href="../site/_design-system/css/components.css">
<link rel="stylesheet" href="../site/_design-system/css/tables.css">
<link rel="stylesheet" href="../site/_design-system/css/status.css">
<link rel="stylesheet" href="../site/_design-system/css/views.css">
<link rel="stylesheet" href="../site/cms/_assets/style-cms.css">
</head>
<body class="dot-surface">

<div class="layout">

  <main class="main">
    <div class="view active">

      <div class="view-header">
        <div>
          <h2 class="view-title">Series</h2>
          <p class="view-subtitle">Ordered groups of articles. Each series gets its own /series/&lt;slug&gt;/ index page. Click a row to edit its parts.</p>
        </div>
        <div class="view-header-actions">
          <a href="#" class="btn-pri">+ New Series</a>
        </div>
      </div>

      <div class="content-area">
        <div class="content-block">
          <div class="content-block-header">
            <div>
              <span class="content-block-label">All series</span>
            </div>
            <span class="content-block-count">3</span>
          </div>

          <div class="table-card">
            <table class="cms-table">
              <thead>
                <tr>
                  <th style="width:32%">Name</th>
                  <th style="width:22%">Slug</th>
                  <th style="width:10%">Parts</th>
                  <th style="width:14%">Status</th>
                  <th style="width:22%"></th>
                </tr>
              </thead>
              <tbody>
                <tr class="row-clickable" data-row-href="SERIES-EDIT-MOCKUP.html" onclick="location.href='SERIES-EDIT-MOCKUP.html'">
                  <td><a href="SERIES-EDIT-MOCKUP.html" class="row-title" style="color:var(--primary);text-decoration:none;font-weight:600">UX 2.0</a></td>
                  <td><span class="val-pill">ux-2-0</span></td>
                  <td>4</td>
                  <td><span class="pill pill-published"><span class="live-dot"></span>Live</span></td>
                  <td class="cell-actions">
                    <div class="row-actions">
                      <a href="#" class="btn-sec btn-tiny">Live ↗</a>
                      <a href="SERIES-EDIT-MOCKUP.html" class="btn-sec btn-tiny">Edit</a>
                    </div>
                  </td>
                </tr>
                <tr class="row-clickable">
                  <td><a href="#" class="row-title" style="color:var(--primary);text-decoration:none;font-weight:600">Leading Design</a></td>
                  <td><span class="val-pill">leading-design</span></td>
                  <td>2</td>
                  <td><span class="pill pill-draft">Draft</span></td>
                  <td class="cell-actions">
                    <div class="row-actions">
                      <a href="#" class="btn-sec btn-tiny">Live ↗</a>
                      <a href="#" class="btn-sec btn-tiny">Edit</a>
                    </div>
                  </td>
                </tr>
                <tr class="row-clickable">
                  <td><a href="#" class="row-title" style="color:var(--primary);text-decoration:none;font-weight:600">On Coaching</a></td>
                  <td><span class="val-pill">on-coaching</span></td>
                  <td>1</td>
                  <td><span class="pill pill-concept">Concept</span></td>
                  <td class="cell-actions">
                    <div class="row-actions">
                      <a href="#" class="btn-sec btn-tiny">Live ↗</a>
                      <a href="#" class="btn-sec btn-tiny">Edit</a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

</div>

</body>
</html>
