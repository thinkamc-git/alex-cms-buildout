<script>
  // Adds .is-active to whichever nav link matches the current URL. Runs
  // inline immediately after the nav so there's no visual flash.
  (function () {
    var path = location.pathname.replace(/\/$/, '');
    if (path === '') path = '/';
    var sel = '.layout-nav a[href="' + path + '"], .layout-nav a[href="' + path + '/"]';
    var link = document.querySelector(sel);
    if (link) link.classList.add('is-active');
  })();
</script>
